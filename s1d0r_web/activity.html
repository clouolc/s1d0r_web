<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxiDoll Lab</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <main class="window">

        <div class="window-titlebar">
            <div class="window-name">
                📁 Activity.exe
            </div>

            <div class="window-buttons">
                <span>_</span>
                <span>□</span>
                <span>✕</span>
            </div>
        </div>

        <div class="window-content">

            <section class="hero">
                <a href="./index.html">
                    <img src="image/logo.png" alt="OxiDoll Lab Logo" class="Logo">
                </a>

                <p>
                    リンクまとめサイトです。
                </p>
            </section>

            <section class="section-window">

                <p class="gallery-title">✦ Gallery ✦</p>

                <div class="gallery-grid">

                    <!--1枚目-->
                    <div class="illust-wrap">
                        <a href="#" class="thumb-link">
                            <figure class="gallery-card">
                                <img src="image/activity1.webp" alt="activity1">                            
                            </figure>
                        </a>
                    </div>

                    <!--2枚目-->
                    <div class="illust-wrap">
                        <a href="#" class="thumb-link">
                            <figure class="gallery-card">
                                <img src="image/activity2.webp" alt="activity2">
                            </figure>
                        </a>
                    </div>

                    <!--3枚目-->
                    <div class="illust-wrap">
                        <a href="#" class="thumb-link">
                            <figure class="gallery-card">
                                <img src="image/activity3.webp" alt="activity3">
                            </figure>
                        </a>
                    </div>

                    <!--4枚目-->
                    <div class="illust-wrap">
                        <a href="#" class="thumb-link">
                            <figure class="gallery-card">
                                <img src="image/activity4.webp" alt="activity4">
                            </figure>
                        </a>
                    </div>

                </div>

            </section>
        </div>

    </main>

    <script src="gallery.js"></script>

</body>
</html>
