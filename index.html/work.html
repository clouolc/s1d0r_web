<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxiDoll Lab</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <main class="window">

        <div class="window-titlebar">
            <div class="window-name">
                🎨 Work.exe
            </div>

            <div class="window-buttons">
                <span>_</span>
                <span>□</span>
                <span>✕</span>
            </div>
        </div>

        <div class="window-content">

            <section class="hero">
                <a href="./index.html">
                    <img src="image/logo.png" alt="OxiDoll Lab Logo" class="Logo">
                </a>
                <p>
                    リンクまとめサイトです。
                </p>
            </section>

            <!-- ========== ギャラリー ========== -->
            <section class="section-window">

                <p class="gallery-title">✦ Gallery ✦</p>

                <div class="gallery-grid">

                    <!--1枚目-->
                    <div class="illust-wrap">
                        <a href="#" class="thumb-link">
                            <figure class="gallery-card">
                                <img src="image/work1.webp" alt="work1">                            
                            </figure>
                        </a>
                    </div>

                    <!--2枚目-->
                    <div class="illust-wrap">
                        <a href="#" class="thumb-link">
                            <figure class="gallery-card">
                                <img src="image/work2.webp" alt="work2">
                            </figure>
                        </a>
                    </div>

                    <!--3枚目-->
                    <div class="illust-wrap">
                        <a href="#" class="thumb-link">
                            <figure class="gallery-card">
                                <img src="image/work3.webp" alt="work3">
                            </figure>
                        </a>
                    </div>

                    <!--4枚目-->
                    <div class="illust-wrap">
                        <a href="#" class="thumb-link">
                            <figure class="gallery-card">
                                <img src="image/work4.webp" alt="work4">
                            </figure>
                        </a>
                    </div>

                </div>

            </section>

        </div>

    </main>
    <script src="gallery.js"></script>
</body>
</html>
